name: CI evals

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  orchestration-evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run cheap orchestration evals
        working-directory: autopep
        run: PYTHONPATH=modal python -m autopep_agent.ci_evals
